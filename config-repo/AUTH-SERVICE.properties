server.port=8081
spring.application.name=AUTH-SERVICE

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.ip-address=${EUREKA_INSTANCE_IP:127.0.0.1}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/auth_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=mysupersecuresecretkeymysupersecuresecretkey12345
jwt.expiration=3600000
auth.bootstrap.admin.enabled=true
auth.bootstrap.admin.email=admin@finflow.com
auth.bootstrap.admin.password=Admin@123

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
