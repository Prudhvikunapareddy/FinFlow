server.port=8083
spring.application.name=api-gateway
spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.ip-address=${EUREKA_INSTANCE_IP:127.0.0.1}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/gateway/auth/**,/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[1].id=application-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/gateway/applications/**,/applications/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[2].id=document-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://DOCUMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/gateway/documents/**,/documents/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\{segment}

spring.cloud.gateway.server.webflux.routes[3].id=admin-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/gateway/admin/**,/admin/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\{segment}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=auth-service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth
springdoc.swagger-ui.urls[1].name=application-service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/application
springdoc.swagger-ui.urls[2].name=document-service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/document
springdoc.swagger-ui.urls[3].name=admin-service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/admin

spring.cloud.gateway.server.webflux.routes[4].id=auth-docs
spring.cloud.gateway.server.webflux.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/v3/api-docs/auth
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/v3/api-docs/auth, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[5].id=application-docs
spring.cloud.gateway.server.webflux.routes[5].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/v3/api-docs/application
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/v3/api-docs/application, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[6].id=document-docs
spring.cloud.gateway.server.webflux.routes[6].uri=lb://DOCUMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/v3/api-docs/document
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/v3/api-docs/document, /v3/api-docs

spring.cloud.gateway.server.webflux.routes[7].id=admin-docs
spring.cloud.gateway.server.webflux.routes[7].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/v3/api-docs/admin
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/v3/api-docs/admin, /v3/api-docs

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging.level.org.springframework.cloud.gateway=DEBUG
jwt.secret=mysupersecuresecretkeymysupersecuresecretkey12345
