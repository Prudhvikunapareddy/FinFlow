spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.application.name=ADMIN-SERVICE
server.port=8086

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.ip-address=${EUREKA_INSTANCE_IP:127.0.0.1}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/admin_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

jwt.secret=${JWT_SECRET:mysupersecuresecretkeymysupersecuresecretkey12345}
document.service.url=${DOCUMENT_SERVICE_URL:http://DOCUMENT-SERVICE}
auth.service.url=${AUTH_SERVICE_URL:http://AUTH-SERVICE}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
