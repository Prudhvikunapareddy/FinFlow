server.port=8083
spring.application.name=api-gateway
spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[1].id=application-service
spring.cloud.gateway.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/gateway/applications/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[2].id=document-service
spring.cloud.gateway.routes[2].uri=lb://DOCUMENT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/gateway/documents/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\\{segment}

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/gateway/(?<segment>.*), /$\\{segment}

logging.level.org.springframework.cloud.gateway=DEBUG



jwt.secret=mysupersecuresecretkeymysupersecuresecretkey12345