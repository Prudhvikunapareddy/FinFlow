server.port=8083
spring.application.name=api-gateway
spring.main.web-application-type=reactive

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true


spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=application-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/applications/**


logging.level.org.springframework.cloud.gateway=DEBUG

jwt.secret=mysupersecuresecretkeymysupersecuresecretkey12345
