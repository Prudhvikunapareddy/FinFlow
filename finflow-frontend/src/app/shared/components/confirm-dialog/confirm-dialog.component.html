@if (open()) {
  <div class="dialog-backdrop" (click)="cancelled.emit()">
    <div class="dialog-panel" (click)="$event.stopPropagation()">
      <h3>{{ title() }}</h3>
      <p>{{ message() }}</p>

      <div class="dialog-actions">
        <button type="button" class="button button-secondary" (click)="cancelled.emit()">Cancel</button>
        <button
          type="button"
          class="button"
          [class.button-primary]="tone() === 'default'"
          [class.button-danger]="tone() === 'danger'"
          (click)="confirmed.emit()"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
