<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__inner">
      <div class="admin-sidebar__heading">
        <span>Admin Console</span>
        <h2>Operational Review</h2>
        <p>Monitor applications, document checks, and access control without leaving the gateway.</p>
      </div>

      <nav class="admin-sidebar__nav">
        <a routerLink="/admin/applications" routerLinkActive="is-active" class="admin-sidebar__link">
          Applications
        </a>
        <a routerLink="/admin/users" routerLinkActive="is-active" class="admin-sidebar__link">
          Users
        </a>
      </nav>

      <section class="admin-sidebar__report">
        <span class="admin-sidebar__label">Report Snapshot</span>
        <p>{{ reportSummary() }}</p>
        @if (loadingReport()) {
          <span class="inline-muted">Refreshing totals...</span>
        }
      </section>
    </div>
  </aside>

  <main class="admin-content">
    <router-outlet />
  </main>
</div>
