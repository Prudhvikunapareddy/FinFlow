<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span>New Account</span>
      <h1>Create your FinFlow access</h1>
      <p>Start drafting loan applications and track every decision through one workflow.</p>
    </div>

    <form class="section-stack" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label class="field-label" for="signup-email">Email</label>
        <input id="signup-email" class="field-control" type="email" formControlName="email" autocomplete="email" />
        <div class="field-error">{{ hasError('email') ? getError('email') : '' }}</div>
      </div>

      <div class="field-group">
        <label class="field-label" for="signup-password">Password</label>
        <input
          id="signup-password"
          class="field-control"
          type="password"
          formControlName="password"
          autocomplete="new-password"
        />
        <div class="field-error">{{ hasError('password') ? getError('password') : '' }}</div>
      </div>

      <button type="submit" class="button button-primary auth-submit" [disabled]="submitting()">
        {{ submitting() ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footnote">
      Already registered?
      <a routerLink="/login">Return to sign in</a>
    </p>
  </div>
</div>
