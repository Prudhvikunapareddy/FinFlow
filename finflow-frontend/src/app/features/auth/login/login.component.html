<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <span>Secure Access</span>
      <h1>Sign in to FinFlow</h1>
      <p>Track loan drafts, submissions, approvals, and review actions through the gateway.</p>
    </div>

    <form class="section-stack" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label class="field-label" for="login-email">Email</label>
        <input id="login-email" class="field-control" type="email" formControlName="email" autocomplete="email" />
        <div class="field-error">{{ hasError('email') ? getError('email') : '' }}</div>
      </div>

      <div class="field-group">
        <label class="field-label" for="login-password">Password</label>
        <input
          id="login-password"
          class="field-control"
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
        <div class="field-error">{{ hasError('password') ? getError('password') : '' }}</div>
      </div>

      <button type="submit" class="button button-primary auth-submit" [disabled]="submitting()">
        {{ submitting() ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footnote">
      New to FinFlow?
      <a routerLink="/signup">Create your account</a>
    </p>
  </div>
</div>
