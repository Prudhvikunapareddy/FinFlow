server.port=8888
spring.application.name=CONFIG-SERVER

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=${EUREKA_PREFER_IP:true}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.ip-address=${EUREKA_INSTANCE_IP:127.0.0.1}

spring.profiles.active=${CONFIG_SERVER_PROFILE:native}
spring.cloud.config.server.native.search-locations=${CONFIG_REPO_LOCATION:file:../config-repo,file:./config-repo}

spring.cloud.config.server.git.uri=https://github.com/Prudhvikunapareddy/finflow-config-repo
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true


management.endpoints.web.exposure.include=health,info,env
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
